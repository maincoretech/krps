name: Build & Release 478 Server

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: 
          - bun-linux-x64
          - bun-linux-arm64
          - bun-windows-x64
          - bun-darwin-x64
          - bun-darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Minified Binary
        run: bun build --compile --minify --sourcemap=none --target=${{ matrix.target }} ./index.js --outfile=478-server-${{ matrix.target }}

      - name: Compress with UPX (Linux & Windows)
        if: "!contains(matrix.target, 'darwin')"
        run: |
          sudo apt-get update && sudo apt-get install -y upx-ucl
          upx --best --lzma ./478-server-${{ matrix.target }}*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 478-server-${{ matrix.target }}
          path: ./478-server-${{ matrix.target }}*
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Latest Tag (if main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Set Release Tag
        id: vars
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Publish to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.vars.outputs.tag }}
          name: Release ${{ steps.vars.outputs.tag }}
          artifacts: "artifacts/*"
          allowUpdates: true
          replacesArtifacts: true
          prerelease: ${{ steps.vars.outputs.prerelease }}
          generateReleaseNotes: true
